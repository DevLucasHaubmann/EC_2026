spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

server.port=${SERVER_PORT}

jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION}

# IA - Provider
ai.provider=claude
ai.claude.api-key=${CLAUDE_API_KEY}
ai.claude.base-url=${CLAUDE_BASE_URL:https://api.anthropic.com}
ai.claude.model=${CLAUDE_MODEL:claude-sonnet-4-20250514}
ai.claude.max-tokens=${CLAUDE_MAX_TOKENS:1024}
ai.claude.temperature=${CLAUDE_TEMPERATURE:0.4}
ai.claude.timeout-seconds=${CLAUDE_TIMEOUT_SECONDS:30}