spring.application.name=tukan

# Conexao com MySQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Porta da aplicacao
server.port=${SERVER_PORT}

# JWT Secret (min 32 bytes para HMAC-SHA256)
jwt.secret=${JWT_SECRET}

# Access Token - 15 minutos (900 segundos)
jwt.access-token.expiration=${JWT_ACCESS_EXPIRATION}

# Refresh Token - 7 dias (604800 segundos)
jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION}