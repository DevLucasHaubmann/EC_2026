spring.application.name=tukan

# Conexao com MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/tukan_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Lucas_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Porta da aplicacao
server.port=8081

# JWT Secret (min 32 bytes para HMAC-SHA256)
jwt.secret=Tukan2026JwtSecretKeyHmacSHA256Ok

# Access Token - 15 minutos (900 segundos)
jwt.access-token.expiration=900

# Refresh Token - 7 dias (604800 segundos)
jwt.refresh-token.expiration=604800